<body>
  <main>
    <button id="abreModalProjetoBtn">Novo Projeto</button>

    <!-- Modal Criar -->
    <dialog id="dialogCriarProjeto">
      <h3>Novo Projeto</h3>
      <input id="projecTitle" type="text" placeholder="Título" /><br><br>
      <input id="projectDescription" type="text" placeholder="Descrição" /><br><br>
      <button id="criarProjetoBtn">✅ Criar</button>
      <button id="cancelarProjetoBtn">❌ Cancelar</button>
    </dialog>

    <!-- Modal Editar -->
    <dialog id="dialogEditarProjeto">
      <h3>Editar Projeto</h3>
      <input id="editTitle" type="text" placeholder="Título" /><br><br>
      <input id="editDescription" type="text" placeholder="Descrição" /><br><br>
      <button id="salvarEdicaoBtn">💾 Salvar</button>
      <button id="cancelarEdicaoBtn">❌ Cancelar</button>
    </dialog>

    <!-- Modal Excluir -->
    <dialog id="dialogExcluirProjeto">
      <h3>Tem certeza que deseja excluir?</h3>
      <button id="confirmarExclusaoBtn">🗑️ Excluir</button>
      <button id="cancelarExclusaoBtn">❌ Cancelar</button>
    </dialog>

    <nav id="resultadoProjetos"></nav>
    <div id="detalhesProjeto"></div>
  </main>
</body>
